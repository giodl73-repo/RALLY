name: Rust gates

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  rust:
    name: RALLY
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Format check
        run: cargo fmt -- --check

      - name: Test
        run: cargo test --quiet

      - name: Release build
        run: cargo build --quiet --release
